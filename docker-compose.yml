services:
  mcp:
    container_name: depgraph-stdio
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEPGRAPH_DB_PATH: /data/depgraph.db
      HOST_REPOS_PREFIX: /Users/caiquesantos/code
      CONTAINER_REPOS_PATH: /repos
      FASTEMBED_CACHE_PATH: /app/.cache/fastembed
    volumes:
      - /Users/caiquesantos/code:/repos:ro
      - depgraph-data:/data
    # stdin_open + tty: false so it works with stdio MCP transport
    stdin_open: true
    tty: false
    profiles:
      - debug
    # Use `docker compose run --rm mcp` for one-shot stdio invocation

  mcp-server:
    container_name: depgraph-server
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEPGRAPH_DB_PATH: /data/depgraph.db
      HOST_REPOS_PREFIX: /Users/caiquesantos/code
      CONTAINER_REPOS_PATH: /repos
      DEPGRAPH_HTTP_PORT: "7832"
      FASTEMBED_CACHE_PATH: /app/.cache/fastembed
    volumes:
      - /Users/caiquesantos/code:/repos:ro
      - depgraph-data:/data
    ports:
      - "7832:7832"
    restart: unless-stopped
    command: ["python", "-u", "-m", "depgraph.mcp.server", "--http"]

volumes:
  depgraph-data:
