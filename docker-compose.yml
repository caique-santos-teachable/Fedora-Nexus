services:
  mcp:
    container_name: fedora-nexus-stdio
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FEDORA_NEXUS_DB_PATH: /data/fedora-nexus.db
      HOST_REPOS_PREFIX: ${HOST_REPOS_PREFIX:-}
      CONTAINER_REPOS_PATH: ${CONTAINER_REPOS_PATH:-/repos}
      FASTEMBED_CACHE_PATH: /app/.cache/fastembed
    volumes:
      - fedora-nexus-data:/data
      - ${HOST_REPOS_PREFIX:-/tmp}:${CONTAINER_REPOS_PATH:-/repos}:ro
    # stdin_open + tty: false so it works with stdio MCP transport
    stdin_open: true
    tty: false
    profiles:
      - debug
    # Use `docker compose run --rm mcp` for one-shot stdio invocation

  mcp-server:
    container_name: fedora-nexus-server
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FEDORA_NEXUS_DB_PATH: /data/fedora-nexus.db
      HOST_REPOS_PREFIX: ${HOST_REPOS_PREFIX:-}
      CONTAINER_REPOS_PATH: ${CONTAINER_REPOS_PATH:-/repos}
      FEDORA_NEXUS_HTTP_PORT: "7832"
      FASTEMBED_CACHE_PATH: /app/.cache/fastembed
    volumes:
      - fedora-nexus-data:/data
      - ${HOST_REPOS_PREFIX:-/tmp}:${CONTAINER_REPOS_PATH:-/repos}:ro
    ports:
      - "7832:7832"
    restart: unless-stopped
    command: ["python", "-u", "-m", "fedora_nexus.mcp.server", "--http"]

volumes:
  fedora-nexus-data:
    name: fedora-nexus-data
